<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Truthware</title>
  <meta name="description" content="Get in touch with Truthware." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@700;800&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a class="logo" href="index.html">Truthware</a>
      <ul class="nav-links">
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">Our Story</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-toggle" aria-expanded="false" aria-label="Toggle menu">Menu</button>
    </nav>
  </header>

  <section class="hero" style="padding-bottom: var(--space-4);">
    <div class="hero-inner">
      <p class="eyebrow">Contact</p>
      <h1 style="font-size: clamp(2.25rem, 6vw, 4rem);">Get in Touch</h1>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <!--
        This form is wired for Netlify Forms — no backend needed.
        Once this site is deployed on Netlify, submissions show up
        automatically in the Netlify dashboard under Forms.
        Just make sure "data-netlify=true" and the hidden form-name
        input stay in place.
      -->
      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact" />
        <p hidden>
          <label>Don't fill this out if you're human: <input name="bot-field" /></label>
        </p>

        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-solid">Send Message</button>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="logo">Truthware</span>
      <ul class="nav-links">
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">Our Story</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <span class="footer-note">&copy; <span id="year"></span> Truthware. Made close to home.</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
