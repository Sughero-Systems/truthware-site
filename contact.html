<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — TruthWare</title>
  <meta name="description" content="Get in touch with TruthWare." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a class="logo" href="index.html">TruthWare</a>
      <ul class="nav-links">
        <li><a href="collections.html">Collections</a></li>
        <li><a href="language.html">The Language</a></li>
        <li><a href="journal.html">Journal</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="shop.html">Shop</a></li>
      </ul>
      <button class="nav-toggle" aria-expanded="false" aria-label="Toggle menu">Menu</button>
    </nav>
  </header>

  <section class="page-head">
    <div class="container">
      <span class="eyebrow">Contact</span>
      <h1>Get in Touch</h1>
      <p>For press, stockists, or anything that doesn't fit anywhere else on this site.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <!--
        Wired for Netlify Forms — no backend needed. Once this site is
        deployed on Netlify, submissions show up in the Forms tab of the
        Netlify dashboard automatically.
      -->
      <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact" />
        <p hidden>
          <label>Don't fill this out if you're human: <input name="bot-field" /></label>
        </p>

        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="logo">TruthWare</span>
      <ul class="nav-links">
        <li><a href="collections.html">Collections</a></li>
        <li><a href="language.html">The Language</a></li>
        <li><a href="journal.html">Journal</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <span class="footer-note">&copy; <span id="year"></span> TruthWare.</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
